<!DOCTYPE html>
<html>
<head>
    <title>Team Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .section {
            padding: 80px 0;
        }
        .feature-box {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 20px;
        }
    </style>
</head>

<body>

<!-- HERO SECTION -->
<div class="container text-center section">
    <h1 class="display-4 fw-bold">Team Task Manager</h1>
    <p class="lead mt-3">Manage projects and track tasks efficiently</p>

    <div class="mt-4">
        <a href="/login" class="btn btn-light me-2 px-4">Login</a>
        <a href="/register" class="btn btn-outline-light px-4">Register</a>
    </div>
</div>

<!-- FEATURES SECTION -->
<div class="container section">
    <div class="row text-center">

        <div class="col-md-4 mb-4">
            <div class="feature-box">
                <h5>📁 Project Management</h5>
                <p>Create and manage multiple projects easily</p>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="feature-box">
                <h5>📝 Task Assignment</h5>
                <p>Assign tasks to team members with roles</p>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="feature-box">
                <h5>📊 Progress Tracking</h5>
                <p>Track task status and completion progress</p>
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<div class="text-center pb-4">
    <small>© 2026 Team Task Manager</small>
</div>

</body>
</html>
